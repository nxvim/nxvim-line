# stylua formatting for nxvim-line — matches nxvim's first-party Lua style:
# 2-space indents, 100-column width, double-quote strings.
column_width = 100
line_endings = "Unix"
indent_type = "Spaces"
indent_width = 2
quote_style = "AutoPreferDouble"
call_parentheses = "Always"
collapse_simple_statement = "Never"
